name: Vercel Production Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

  deploy-production:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Ensure production access is public
        run: |
          set -euo pipefail

          PROJECT_API="https://api.vercel.com/v9/projects/${{ env.VERCEL_PROJECT_ID }}?teamId=${{ env.VERCEL_ORG_ID }}"

          RESPONSE="$(curl -sS -X PATCH "$PROJECT_API" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"ssoProtection":null,"trustedIps":null,"passwordProtection":null}')"

          echo "$RESPONSE" | node -e '
            const fs = require("fs");
            const input = fs.readFileSync(0, "utf8");
            const data = JSON.parse(input);
            if (data.error) {
              console.error("Failed to update deployment protection:", JSON.stringify(data));
              process.exit(1);
            }
            console.log("ssoProtection:", data.ssoProtection ?? null);
            console.log("trustedIps:", data.trustedIps ?? null);
            console.log("passwordProtection:", data.passwordProtection ?? null);
          '

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          set -euo pipefail

          DEPLOY_OUTPUT="$(vercel deploy --yes --prod --token=${{ secrets.VERCEL_TOKEN }})"
          echo "$DEPLOY_OUTPUT"

          DEPLOY_URL="$(printf '%s\n' "$DEPLOY_OUTPUT" | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -n1)"
          if [[ -z "$DEPLOY_URL" ]]; then
            echo "Failed to parse deployment URL from Vercel CLI output"
            exit 1
          fi

          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke check deployment URL
        run: |
          set -euo pipefail

          DEPLOY_URL="${{ steps.deploy.outputs.deploy_url }}"
          BLOCKED='^(401|403|404)$'

          check_url() {
            local label="$1"
            local url="$2"
            local attempts=8
            local delay=5

            for attempt in $(seq 1 "$attempts"); do
              status="$(curl -sS -L -D /tmp/headers.txt -o /tmp/body.txt -w '%{http_code}' "$url")"
              echo "[$label][$attempt/$attempts] $url -> $status"

              if [[ ! "$status" =~ $BLOCKED ]]; then
                return 0
              fi

              if [[ "$attempt" -lt "$attempts" ]]; then
                sleep "$delay"
              fi
            done

            echo "Smoke check failed for $url"
            echo "--- Response headers ---"
            sed -n '1,30p' /tmp/headers.txt || true
            echo "--- Response body ---"
            sed -n '1,40p' /tmp/body.txt || true
            return 1
          }

          for path in "" "/blog"; do
            url="$DEPLOY_URL$path"
            check_url "deploy" "$url"
          done

      - name: Smoke check custom domain
        run: |
          set -euo pipefail

          CUSTOM_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
          BLOCKED='^(401|403|404)$'

          check_url() {
            local label="$1"
            local url="$2"
            local attempts=8
            local delay=5

            for attempt in $(seq 1 "$attempts"); do
              status="$(curl -sS -L -D /tmp/headers.txt -o /tmp/body.txt -w '%{http_code}' "$url")"
              echo "[$label][$attempt/$attempts] $url -> $status"

              if [[ ! "$status" =~ $BLOCKED ]]; then
                return 0
              fi

              if [[ "$attempt" -lt "$attempts" ]]; then
                sleep "$delay"
              fi
            done

            echo "Smoke check failed for $url"
            echo "--- Response headers ---"
            sed -n '1,30p' /tmp/headers.txt || true
            echo "--- Response body ---"
            sed -n '1,40p' /tmp/body.txt || true
            return 1
          }

          if [[ -z "$CUSTOM_URL" ]]; then
            echo "Missing NEXT_PUBLIC_SITE_URL secret"
            exit 1
          fi

          for path in "" "/blog"; do
            url="$CUSTOM_URL$path"
            check_url "custom" "$url"
          done

