name: Vercel Production Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

  deploy-production:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          set -euo pipefail

          DEPLOY_OUTPUT="$(vercel deploy --yes --prod --token=${{ secrets.VERCEL_TOKEN }})"
          echo "$DEPLOY_OUTPUT"

          DEPLOY_URL="$(printf '%s\n' "$DEPLOY_OUTPUT" | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -n1)"
          if [[ -z "$DEPLOY_URL" ]]; then
            echo "Failed to parse deployment URL from Vercel CLI output"
            exit 1
          fi

          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke check deployment URL
        run: |
          set -euo pipefail

          DEPLOY_URL="${{ steps.deploy.outputs.deploy_url }}"

          for path in "" "/blog"; do
            url="$DEPLOY_URL$path"
            status="$(curl -sS -L -o /tmp/deploy-response.txt -w '%{http_code}' "$url")"
            echo "[deploy] $url -> $status"

            if [[ "$status" =~ ^(401|403|404)$ ]]; then
              echo "Deployment URL smoke check failed for $url with status $status"
              head -n 40 /tmp/deploy-response.txt || true
              exit 1
            fi
          done

      - name: Smoke check custom domain
        run: |
          set -euo pipefail

          CUSTOM_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
          if [[ -z "$CUSTOM_URL" ]]; then
            echo "Missing NEXT_PUBLIC_SITE_URL secret"
            exit 1
          fi

          for path in "" "/blog"; do
            url="$CUSTOM_URL$path"
            status="$(curl -sS -L -o /tmp/custom-response.txt -w '%{http_code}' "$url")"
            echo "[custom] $url -> $status"

            if [[ "$status" =~ ^(401|403|404)$ ]]; then
              echo "Custom domain smoke check failed for $url with status $status"
              head -n 40 /tmp/custom-response.txt || true
              exit 1
            fi
          done

